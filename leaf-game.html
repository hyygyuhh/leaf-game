<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>落叶物语-落叶清理模拟器 - Leaf it Alone Web</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

  :root {
    --cream: #faf6f0;
    --cream-dark: #f0ebe3;
    --paper: #f5f0e8;
    --ink: #3d3229;
    --ink-light: #6b5e52;
    --ink-muted: #a89a8c;
    --accent: #d4763a;
    --accent-soft: #e8a87c;
    --accent-warm: #c45c2c;
    --green: #5a8a4e;
    --green-soft: #8ab87e;
    --green-light: #c4d9b8;
    --sky: #b8d4e3;
    --sky-soft: #d4e8f0;
    --gold: #d4a03a;
    --lavender: #c4a8c8;
    --rose: #d4949c;
    --card: rgba(250, 246, 240, 0.92);
    --border: rgba(61, 50, 41, 0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Noto Sans SC', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: default;
    -webkit-user-select: none;
    user-select: none;
  }

  #gameCanvas {
    display: block;
    width: 100vw;
    height: 100vh;
    cursor: none;
  }

  /* ===== HUD ===== */
  .hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    z-index: 10;
  }

  .hud-left, .hud-right { display: flex; flex-direction: column; gap: 6px; }

  .hud-card {
    background: var(--card);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 10px 16px;
    pointer-events: auto;
    transition: transform 0.2s, box-shadow 0.2s;
    min-width: 100px;
    box-shadow: 0 2px 12px rgba(61, 50, 41, 0.06);
  }

  .hud-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(61, 50, 41, 0.1);
  }

  .hud-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--ink-muted);
    margin-bottom: 3px;
    font-weight: 500;
  }

  .hud-value {
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 28px;
    font-weight: 400;
    color: var(--accent);
    line-height: 1;
  }

  .hud-value.small { font-size: 20px; }
  .hud-value.gold { color: var(--gold); }

  .hud-value.bump {
    animation: hudBump 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes hudBump {
    0% { transform: scale(1); }
    40% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .progress-bar {
    width: 140px;
    height: 5px;
    background: rgba(61, 50, 41, 0.06);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 6px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-soft), var(--green), var(--accent-soft));
    border-radius: 3px;
    transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    width: 0%;
  }

  .combo-bar-wrap {
    width: 50px;
    height: 3px;
    background: rgba(61, 50, 41, 0.06);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }

  .combo-bar-fill {
    height: 100%;
    background: var(--accent-soft);
    border-radius: 2px;
    transition: width 0.1s linear;
    width: 0%;
  }

  .combo-bar-fill.urgent {
    background: var(--rose);
    animation: urgentPulse 0.4s ease infinite alternate;
  }

  @keyframes urgentPulse {
    from { opacity: 0.5; }
    to { opacity: 1; }
  }

  /* ===== TOOLBAR ===== */
  .toolbar {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(0);
    display: flex;
    gap: 5px;
    padding: 7px 12px;
    background: var(--card);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    z-index: 10;
    pointer-events: auto;
    box-shadow: 0 4px 20px rgba(61, 50, 41, 0.08);
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease;
  }

  .toolbar.hidden-bar {
    transform: translateX(-50%) translateY(100px);
    opacity: 0;
    pointer-events: none;
  }

  .tool-btn {
    width: 50px;
    height: 50px;
    border: 2px solid transparent;
    border-radius: 14px;
    background: rgba(61, 50, 41, 0.03);
    color: var(--ink);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    outline: none;
  }

  .tool-btn .tool-name {
    font-size: 8px;
    letter-spacing: 0.5px;
    color: var(--ink-muted);
    font-weight: 500;
  }

  .tool-btn .tool-cost {
    position: absolute;
    bottom: -1px;
    font-size: 8px;
    color: var(--gold);
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .tool-btn.locked .tool-cost { opacity: 1; }

  .tool-btn:hover {
    background: rgba(212, 118, 58, 0.08);
    border-color: rgba(212, 118, 58, 0.15);
    transform: translateY(-2px);
  }

  .tool-btn.active {
    background: linear-gradient(145deg, rgba(212, 118, 58, 0.18), rgba(196, 92, 44, 0.12));
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(212, 118, 58, 0.12), inset 0 1px 0 rgba(255,255,255,0.3);
  }

  .tool-btn.active .tool-name { color: var(--accent); }

  .tool-btn.locked {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .tool-btn .lock-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.15);
    border-radius: 12px;
    font-size: 12px;
  }

  .tool-btn .upgrade-dot {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 8px;
    height: 8px;
    background: var(--gold);
    border-radius: 50%;
    border: 1.5px solid var(--cream);
    display: none;
  }

  .tool-btn.has-upgrade .upgrade-dot { display: block; }

  /* ===== PAUSE BTN ===== */
  .pause-btn {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 36px;
    height: 36px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    backdrop-filter: blur(12px);
    color: var(--ink-muted);
    font-size: 14px;
    cursor: pointer;
    z-index: 11;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    outline: none;
  }

  .pause-btn:hover { color: var(--ink); border-color: var(--accent); }

  /* ===== TOOL CURSOR ===== */
  .tool-cursor {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    font-size: 26px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    transform: translate(-12px, -12px);
    transition: font-size 0.15s ease;
    display: none;
  }

  .tool-cursor.active { display: block; }
  .tool-cursor.pressing {
    font-size: 30px;
    filter: drop-shadow(0 2px 8px rgba(212, 118, 58, 0.4));
  }

  .action-ring {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    border-radius: 50%;
    border: 2px solid var(--accent);
    opacity: 0;
    transition: opacity 0.15s ease, width 0.2s ease, height 0.2s ease;
    transform: translate(-50%, -50%);
  }

  .action-ring.visible { opacity: 0.25; }
  .action-ring.rake { border-color: var(--accent-warm); }
  .action-ring.blower { border-color: #7eb8d4; border-style: dashed; }
  .action-ring.vacuum { border-color: var(--gold); animation: vacuumPulse 0.5s ease-in-out infinite alternate; }
  .action-ring.broom { border-color: var(--lavender); border-width: 3px; }
  .action-ring.flame { border-color: #e85a3a; border-style: dotted; }
  .action-ring.freeze { border-color: #7ec8e3; opacity: 0.15; }
  .action-ring.magnet { border-color: #c4a8c8; border-style: double; }

  @keyframes vacuumPulse {
    from { transform: translate(-50%, -50%) scale(0.92); opacity: 0.15; }
    to { transform: translate(-50%, -50%) scale(1.08); opacity: 0.3; }
  }

  /* ===== START SCREEN ===== */
  .start-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #e8ddd0 0%, var(--cream) 40%, var(--paper) 100%);
    transition: opacity 1s ease, visibility 1s;
  }

  .start-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .start-leaves {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .start-leaf {
    position: absolute;
    font-size: 22px;
    opacity: 0.2;
    animation: floatLeaf linear infinite;
  }

  @keyframes floatLeaf {
    0% { transform: translateY(-40px) rotate(0deg) scale(0.8); opacity: 0; }
    8% { opacity: 0.2; transform: translateY(8vh) rotate(60deg) scale(1); }
    92% { opacity: 0.2; }
    100% { transform: translateY(105vh) rotate(720deg) scale(0.6); opacity: 0; }
  }

  .start-content {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 480px;
    padding: 0 24px;
  }

  .start-badge {
    display: inline-block;
    padding: 4px 16px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 18px;
    background: rgba(255,255,255,0.5);
  }

  .start-title {
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: clamp(44px, 9vw, 84px);
    font-weight: 400;
    color: var(--ink);
    line-height: 1.05;
    margin-bottom: 6px;
  }

  .start-title em {
    font-style: normal;
    color: var(--accent);
  }

  .start-subtitle {
    font-size: 15px;
    color: var(--ink-muted);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 32px;
    font-weight: 300;
  }

  .start-instructions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 36px;
    text-align: left;
    padding: 18px 22px;
    background: rgba(255,255,255,0.6);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    backdrop-filter: blur(8px);
  }

  .instruction-row {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: var(--ink-light);
    line-height: 1.4;
  }

  .instruction-icon {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: rgba(212, 118, 58, 0.08);
    border: 1.5px solid rgba(212, 118, 58, 0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .start-btn {
    padding: 14px 52px;
    background: linear-gradient(135deg, var(--accent), var(--accent-warm));
    border: none;
    border-radius: 50px;
    color: white;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 4px 24px rgba(212, 118, 58, 0.25), 0 0 0 0 rgba(212, 118, 58, 0);
    position: relative;
    overflow: hidden;
  }

  .start-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
    transform: translateX(-100%);
    transition: transform 0.6s;
  }

  .start-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 36px rgba(212, 118, 58, 0.4), 0 0 0 4px rgba(212, 118, 58, 0.08);
  }

  .start-btn:hover::after { transform: translateX(100%); }

  .start-footer {
    position: absolute;
    bottom: 22px;
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 1px;
    opacity: 0.6;
  }

  /* ===== COMBO POPUP ===== */
  .combo-popup {
    position: fixed;
    z-index: 20;
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 32px;
    color: var(--accent);
    text-shadow: 0 2px 12px rgba(212, 118, 58, 0.4);
    pointer-events: none;
    animation: comboAnim 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    white-space: nowrap;
  }

  .combo-popup.gold {
    color: var(--gold);
    text-shadow: 0 2px 12px rgba(212, 160, 58, 0.5);
    font-size: 26px;
  }

  @keyframes comboAnim {
    0% { transform: translateY(0) scale(0.4); opacity: 0; }
    15% { transform: translateY(-8px) scale(1.3); opacity: 1; }
    100% { transform: translateY(-70px) scale(0.7); opacity: 0; }
  }

  /* ===== COIN FLY ===== */
  .coin-fly {
    position: fixed;
    z-index: 20;
    pointer-events: none;
    font-size: 17px;
    animation: coinFlyAnim 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes coinFlyAnim {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-50px) scale(0.5); opacity: 0; }
  }

  /* ===== LEVEL COMPLETE ===== */
  .level-complete {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(250, 246, 240, 0);
    backdrop-filter: blur(0px);
    opacity: 0;
    visibility: hidden;
    transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .level-complete.show {
    opacity: 1;
    visibility: visible;
    background: rgba(250, 246, 240, 0.92);
    backdrop-filter: blur(10px);
  }

  .lc-stars {
    display: flex;
    gap: 12px;
    margin-bottom: 18px;
  }

  .lc-star {
    font-size: 40px;
    color: rgba(61, 50, 41, 0.1);
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    transform: scale(0.5) rotate(-20deg);
  }

  .lc-star.earned {
    color: var(--gold);
    text-shadow: 0 0 16px rgba(212, 160, 58, 0.4);
    transform: scale(1) rotate(0deg);
  }

  .level-complete h2 {
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 44px;
    font-weight: 400;
    color: var(--accent);
    margin-bottom: 6px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.5s 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .level-complete.show h2 { opacity: 1; transform: translateY(0); }

  .level-complete p {
    font-size: 16px;
    color: var(--ink-muted);
    margin-bottom: 24px;
    opacity: 0;
    transition: opacity 0.5s 0.4s;
  }

  .level-complete.show p { opacity: 1; }

  .level-stats {
    display: flex;
    gap: 32px;
    margin-bottom: 32px;
    opacity: 0;
    transform: translateY(15px);
    transition: all 0.5s 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .level-complete.show .level-stats { opacity: 1; transform: translateY(0); }

  .stat-item { text-align: center; }

  .stat-item .val {
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 32px;
    font-weight: 400;
    color: var(--ink);
  }

  .stat-item .label {
    font-size: 11px;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  .next-btn {
    padding: 14px 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent-warm));
    border: none;
    border-radius: 50px;
    color: white;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 4px 24px rgba(212, 118, 58, 0.25);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.5s 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .level-complete.show .next-btn { opacity: 1; transform: translateY(0); }

  .next-btn:hover {
    transform: translateY(-2px) !important;
    box-shadow: 0 8px 32px rgba(212, 118, 58, 0.4);
  }

  /* ===== PAUSE MENU ===== */
  .pause-menu {
    position: fixed;
    inset: 0;
    z-index: 40;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(250, 246, 240, 0);
    backdrop-filter: blur(0px);
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s ease;
  }

  .pause-menu.show {
    opacity: 1;
    visibility: visible;
    background: rgba(250, 246, 240, 0.85);
    backdrop-filter: blur(6px);
  }

  .pause-menu h2 {
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 36px;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 28px;
  }

  .pause-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .pause-opt {
    padding: 12px 40px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    color: var(--ink);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 1px;
    outline: none;
  }

  .pause-opt:hover {
    background: rgba(212, 118, 58, 0.08);
    border-color: var(--accent-soft);
    transform: translateX(4px);
  }

  /* ===== NOTIFICATION ===== */
  .notification {
    position: fixed;
    top: 64px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--card);
    backdrop-filter: blur(14px);
    border: 1.5px solid var(--accent-soft);
    border-radius: 14px;
    padding: 12px 24px;
    color: var(--accent);
    font-weight: 600;
    font-size: 14px;
    z-index: 30;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
    white-space: nowrap;
  }

  .notification.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===== ACHIEVEMENT TOAST ===== */
  .achievement-toast {
    position: fixed;
    right: 24px;
    background: linear-gradient(135deg, rgba(212, 160, 58, 0.12), rgba(212, 118, 58, 0.08));
    border: 1.5px solid rgba(212, 160, 58, 0.25);
    border-radius: 14px;
    padding: 14px 20px;
    z-index: 35;
    pointer-events: none;
    max-width: 280px;
    transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    transform: translateX(120%);
    opacity: 0;
  }

  .achievement-toast.visible {
    transform: translateX(0);
    opacity: 1;
  }

  .achieve-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 4px;
    font-weight: 600;
  }

  .achieve-text {
    font-size: 14px;
    color: var(--ink);
    font-weight: 500;
  }

  /* ===== LEVEL TRANSITION ===== */
  .level-transition {
    position: fixed;
    inset: 0;
    z-index: 45;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(250, 246, 240, 0);
    opacity: 0;
    visibility: hidden;
    transition: all 0.6s;
    pointer-events: none;
  }

  .level-transition.show {
    opacity: 1;
    visibility: visible;
    background: rgba(250, 246, 240, 0.94);
  }

  .lt-label {
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 8px;
  }

  .lt-name {
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 48px;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .lt-desc {
    font-size: 14px;
    color: var(--ink-muted);
    max-width: 320px;
    text-align: center;
    line-height: 1.6;
  }

  /* ===== FREEZE OVERLAY ===== */
  .freeze-overlay {
    position: fixed;
    inset: 0;
    z-index: 15;
    pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(126, 200, 227, 0.08) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.5s ease;
  }

<script>
// ==================== AUDIO ENGINE ====================
const AudioEngine = {
  ctx: null,
  enabled: true,
  init() {
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { this.enabled = false; }
  },
  resume() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },
  play(type) {
    if (!this.enabled || !this.ctx) return;
    this.resume();
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.connect(gain);
    gain.connect(this.ctx.destination);

    switch(type) {
      case 'collect':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(500 + Math.random() * 200, now);
        osc.frequency.exponentialRampToValueAtTime(1100 + Math.random() * 300, now + 0.08);
        gain.gain.setValueAtTime(0.06, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        osc.start(now);
        osc.stop(now + 0.12);
        break;
      case 'combo':
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(700, now);
        osc.frequency.exponentialRampToValueAtTime(1500, now + 0.1);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
        osc.start(now);
        osc.stop(now + 0.18);
        break;
      case 'gold':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, now);
        osc.frequency.setValueAtTime(1100, now + 0.06);
        osc.frequency.setValueAtTime(1320, now + 0.12);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc.start(now);
        osc.stop(now + 0.25);
        break;
      case 'unlock':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, now);
        osc.frequency.setValueAtTime(659, now + 0.08);
        osc.frequency.setValueAtTime(784, now + 0.16);
        osc.frequency.setValueAtTime(1047, now + 0.24);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.4);
        break;
      case 'levelup':
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.setValueAtTime(554, now + 0.1);
        osc.frequency.setValueAtTime(659, now + 0.2);
        osc.frequency.setValueAtTime(880, now + 0.3);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.start(now);
        osc.stop(now + 0.5);
        break;
      case 'blow':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100 + Math.random() * 50, now);
        gain.gain.setValueAtTime(0.02, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.start(now);
        osc.stop(now + 0.08);
        break;
      case 'vacuum':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(80, now);
        osc.frequency.linearRampToValueAtTime(120, now + 0.12);
        gain.gain.setValueAtTime(0.03, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.start(now);
        osc.stop(now + 0.15);
        break;
      case 'land':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.06);
        gain.gain.setValueAtTime(0.03, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.start(now);
        osc.stop(now + 0.08);
        break;
      case 'wind':
        for (let i = 0; i < 4; i++) {
          const wosc = this.ctx.createOscillator();
          const wgain = this.ctx.createGain();
          wosc.connect(wgain);
          wgain.connect(this.ctx.destination);
          wosc.type = 'sine';
          wosc.frequency.setValueAtTime(80 + Math.random() * 200, now);
          wgain.gain.setValueAtTime(0.01, now);
          wgain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
          wosc.start(now);
          wosc.stop(now + 0.35);
        }
        break;
      case 'switch':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(400, now + 0.06);
        gain.gain.setValueAtTime(0.06, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.start(now);
        osc.stop(now + 0.08);
        break;
      case 'shake':
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(100, now);
        gain.gain.setValueAtTime(0.04, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
        osc.start(now);
        osc.stop(now + 0.06);
        break;
      case 'magic':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(660, now);
        osc.frequency.exponentialRampToValueAtTime(990, now + 0.15);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc.start(now);
        osc.stop(now + 0.25);
        break;
      case 'flame':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.linearRampToValueAtTime(80, now + 0.2);
        gain.gain.setValueAtTime(0.06, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc.start(now);
        osc.stop(now + 0.25);
        break;
      case 'freeze':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1200, now);
        osc.frequency.exponentialRampToValueAtTime(400, now + 0.3);
        gain.gain.setValueAtTime(0.06, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.4);
        break;
      case 'magnet':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.setValueAtTime(450, now + 0.1);
        osc.frequency.setValueAtTime(300, now + 0.2);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
        break;
    }
  }
};

// --- Leaf Shape Drawing ---
function drawLeafShape(c, x, y, size, rotation, color, type) {
  c.save();
  c.translate(x, y);
  c.rotate(rotation);
  c.scale(size, size);
  c.fillStyle = color;
  c.beginPath();

  if (type === 0) {
    c.moveTo(0, -12);
    c.bezierCurveTo(-4, -10, -10, -8, -14, -4);
    c.bezierCurveTo(-10, -2, -8, 2, -6, 4);
    c.bezierCurveTo(-8, 6, -12, 8, -10, 12);
    c.bezierCurveTo(-6, 10, -2, 8, 0, 6);
    c.bezierCurveTo(2, 8, 6, 10, 10, 12);
    c.bezierCurveTo(12, 8, 8, 6, 6, 4);
    c.bezierCurveTo(8, 2, 10, -2, 14, -4);
    c.bezierCurveTo(10, -8, 4, -10, 0, -12);
  } else if (type === 1) {
    c.ellipse(0, 0, 6, 11, 0, 0, Math.PI * 2);
  } else if (type === 2) {
    c.moveTo(0, -13);
    c.bezierCurveTo(-8, -6, -7, 4, 0, 13);
    c.bezierCurveTo(7, 4, 8, -6, 0, -13);
  } else if (type === 4) {
    // Cherry blossom petal
    c.moveTo(0, -10);
    c.bezierCurveTo(-6, -10, -12, -4, -10, 2);
    c.bezierCurveTo(-8, 6, -3, 10, 0, 8);
    c.bezierCurveTo(3, 10, 8, 6, 10, 2);
    c.bezierCurveTo(12, -4, 6, -10, 0, -10);
  } else if (type === 5) {
    // Bamboo leaf - long narrow
    c.moveTo(0, -16);
    c.bezierCurveTo(-3, -12, -5, -4, -4, 0);
    c.bezierCurveTo(-5, 4, -3, 10, 0, 16);
    c.bezierCurveTo(3, 10, 5, 4, 4, 0);
    c.bezierCurveTo(5, -4, 3, -12, 0, -16);
  } else {
    c.ellipse(0, 0, 8, 8, 0, 0, Math.PI * 2);
  }

  c.fill();

  // Soft vein
  c.strokeStyle = 'rgba(0,0,0,0.08)';
  c.lineWidth = 0.5;
  c.beginPath();
  c.moveTo(0, -9);
  c.lineTo(0, 9);
  c.stroke();

  c.restore();
}

// --- Create Leaf ---
function createLeaf(x, y) {
  const theme = levelThemes[state.level - 1];
  const toolbarSafeTop = H() - 90;
  const groundTop = H() * 0.55;
  const groundBottom = Math.min(toolbarSafeTop, H() * 0.97);
  const groundY = groundTop + Math.random() * (groundBottom - groundTop);
  const isGold = Math.random() < theme.leafRatio;

  let leafX = x;
  if (leafX == null) {
    leafX = Math.random() * W();
    if (groundY > toolbarSafeTop - 20) {
      const toolbarHalfW = 220;
      const centerLeft = W() / 2 - toolbarHalfW;
      const centerRight = W() / 2 + toolbarHalfW;
      if (leafX > centerLeft && leafX < centerRight) {
        leafX = Math.random() < 0.5 ? Math.random() * centerLeft : centerRight + Math.random() * (W() - centerRight);
      }
    }
  }

  return {
    x: leafX,
    y: y ?? -20 - Math.random() * 120,
    targetY: groundY,
    vx: (Math.random() - 0.5) * 0.5,
    vy: 0,
    size: 0.7 + Math.random() * 0.65,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.02,
    color: isGold ? leafThemes[state.level - 1].goldColor : leafThemes[state.level - 1].colors[Math.floor(Math.random() * leafThemes[state.level - 1].colors.length)],
    type: leafThemes[state.level - 1].shapes[Math.floor(Math.random() * leafThemes[state.level - 1].shapes.length)],
    grounded: false,
    opacity: 1,
    swayPhase: Math.random() * Math.PI * 2,
    swayAmp: 0.15 + Math.random() * 0.25,
    collected: false,
    gold: isGold,
    goldPhase: Math.random() * Math.PI * 2,
    shadow: 0.4 + Math.random() * 0.25,
  };
}

// --- Scene Generation ---
function generateScene() {

  state.grassPatches = [];
  state.flowers = [];
  state.paths = [];
  state.clouds = [];
  state.birds = [];
  state.mountains = [];
  state.fences = [];
  state.bushes = [];
  state.mushrooms = [];
  state.rocks = [];
  state.butterflies = [];

  const w = W(), h = H();
  const theme = levelThemes[state.level - 1];

  // Mountains
  for (let i = 0; i < 5; i++) {
    state.mountains.push({
      x: i * w * 0.25 - w * 0.05,
      peak: h * (0.22 + Math.random() * 0.1),
      width: w * (0.2 + Math.random() * 0.15),
      color: `rgba(${140 + i * 10}, ${150 + i * 12}, ${130 + i * 8}, ${0.15 + i * 0.04})`,
    });
  }

  // Clouds
  for (let i = 0; i < 4; i++) {
    state.clouds.push({
      x: Math.random() * w,
      y: h * (0.04 + Math.random() * 0.12),
      w: 80 + Math.random() * 120,
      speed: 0.08 + Math.random() * 0.15,
      opacity: 0.04 + Math.random() * 0.05,

  }

  // Birds
  for (let i = 0; i < 3; i++) {
    state.birds.push({
      x: Math.random() * w,
      y: h * (0.06 + Math.random() * 0.12),
      speed: 0.25 + Math.random() * 0.35,
      wingPhase: Math.random() * Math.PI * 2,
      size: 3 + Math.random() * 3,
    });
  }

  // Trees
  const treeCount = 3 + Math.min(state.level, 7);
  for (let i = 0; i < treeCount; i++) {
    state.trees.push({
      x: 60 + Math.random() * (w - 120),
      trunkH: 70 + Math.random() * 70,
      canopyR: 45 + Math.random() * 45,
      swayPhase: Math.random() * Math.PI * 2,
      color: `hsl(${85 + Math.random() * 45}, ${30 + Math.random() * 25}%, ${22 + Math.random() * 18}%)`,
    });
  }

  // Grass
  for (let i = 0; i < 60; i++) {
    state.grassPatches.push({
      x: Math.random() * w,
      y: h * 0.5 + Math.random() * h * 0.5,
      h: 4 + Math.random() * 14,
      phase: Math.random() * Math.PI * 2,
      color: `rgba(${70 + Math.random() * 50}, ${110 + Math.random() * 60}, ${40 + Math.random() * 40}, 0.45)`,
    });
  }

  // Flowers
  for (let i = 0; i < 10; i++) {
    state.flowers.push({
      x: Math.random() * w,
      y: h * 0.6 + Math.random() * h * 0.35,
      color: ['#e8d44a', '#e84a6a', '#4a8ae8', '#e8a04a', '#d44a8a'][Math.floor(Math.random() * 5)],
      size: 2.5 + Math.random() * 3.5,
      petals: 4 + Math.floor(Math.random() * 3),
    });
  }

  // Paths
  const pathX = w * 0.3 + Math.random() * w * 0.4;
  for (let i = 0; i < 10; i++) {
    state.paths.push({
      x: pathX + (Math.random() - 0.5) * 35,
      y: h * 0.55 + i * (h * 0.042),
      w: 26 + Math.random() * 20,
      h: 11 + Math.random() * 9,
    });
  }

  // Fences
  const fenceY = h * 0.52 + Math.random() * h * 0.05;
  const fenceCount = Math.floor(w / 50);
  for (let i = 0; i < fenceCount; i++) {
    const fx = i * 50 + 10;
    state.fences.push({ x: fx, y: fenceY, w: 4, h: 22, color: '#a89078', isPost: true });
    if (i < fenceCount - 1) {
      state.fences.push({ x: fx + 2, y: fenceY + 6, w: 48, h: 3, color: '#b8a088', isPost: false });
      state.fences.push({ x: fx + 2, y: fenceY + 14, w: 48, h: 3, color: '#b8a088', isPost: false });
    }
  }

  // Bushes
  for (let i = 0; i < 4; i++) {
    state.bushes.push({
      x: 40 + Math.random() * (w - 80),
      y: h * 0.52 + Math.random() * h * 0.08,

      color: `hsl(${90 + Math.random() * 30}, ${35 + Math.random() * 20}%, ${28 + Math.random() * 15}%)`,
    });

  // Mushrooms
  for (let i = 0; i < 4; i++) {
    state.mushrooms.push({
      x: 30 + Math.random() * (w - 60),
      y: h * 0.58 + Math.random() * h * 0.35,
      size: 4 + Math.random() * 5,
      capColor: ['#d4947a', '#d4a03a', '#c45c2c', '#b8785a'][Math.floor(Math.random() * 4)],

  // Rocks
  for (let i = 0; i < 5; i++) {

      x: Math.random() * w,
      y: h * 0.55 + Math.random() * h * 0.4,

  for (let i = 0; i < 3; i++) {

      size: 4 + Math.random() * 3,
      changeTimer: 0,
    });
  }
}

  state.leaves = [];

  state.dustParticles = [];

  state.sweepTrail = [];
  state.flyingLeaves = [];
  state.cleanTrails = [];
  state.windDropTimer = 0;
  state.windEventTimer = 0;
  state.windEventActive = false;
  state.windEventDuration = 0;
  state.screenShake = 0;
  state.screenShakeDecay = 0;
  state.achievementQueue = [];
  state.achievementShowing = false;
  state.freezeActive = false;
  state.freezeTimer = 0;
  state.magnetActive = false;
  state.magnetTimer = 0;
  state.leavesCollected = 0;
  state.goldLeavesCollected = 0;
  state.combo = 1;
  state.maxCombo = 1;
  state.comboTimer = 0;

  state.coins = 0;

    setTimeout(() => {
      if (state.running && !state.paused) state.leaves.push(createLeaf());
    }, i * 55);
  }

  document.getElementById('levelNum').textContent = state.level;
  document.getElementById('maxLevelNum').textContent = state.maxLevel;
  updateHUD();
}

// --- Show Level Transition ---
function showLevelTransition(callback) {
  const theme = levelThemes[state.level - 1];
  document.getElementById('ltName').textContent = theme.name;
  document.getElementById('ltDesc').textContent = theme.desc;
  const el = document.getElementById('levelTransition');
  el.classList.add('show');

  setTimeout(() => {
    el.classList.remove('show');
    if (callback) callback();
  }, 2200);
}

// ==================== DRAWING ====================

function drawBackground() {
  const img = bgImages[state.level];
  if (img && img.complete && img.naturalWidth > 0) {
    const canvasRatio = W() / H();
    const imgRatio = img.naturalWidth / img.naturalHeight;
    let dw, dh, dx, dy;
    if (canvasRatio > imgRatio) {
      dw = W();
      dh = W() / imgRatio;
      dx = 0;
      dy = (H() - dh) / 2;
    } else {
      dh = H();
      dw = H() * imgRatio;
      dx = (W() - dw) / 2;
      dy = 0;
    }
    ctx.drawImage(img, dx, dy, dw, dh);
  } else {
    ctx.fillStyle = '#e8ddd0';
    ctx.fillRect(0, 0, W(), H());
  }
}

// Subtle semi-transparent overlay on the ground area so leaves pop visually
function drawGroundOverlay() {
  const groundTop = H() * 0.48;
  const grad = ctx.createLinearGradient(0, groundTop, 0, H());
  grad.addColorStop(0, 'rgba(90, 80, 60, 0)');
  grad.addColorStop(0.15, 'rgba(90, 80, 60, 0.06)');
  grad.addColorStop(0.5, 'rgba(80, 70, 50, 0.1)');
  grad.addColorStop(1, 'rgba(70, 60, 40, 0.14)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, groundTop, W(), H() - groundTop);
}

function drawClouds() {
  state.clouds.forEach(cl => {
    cl.x += cl.speed;
    if (cl.x > W() + cl.w) cl.x = -cl.w;

    ctx.fillStyle = `rgba(255, 255, 255, ${cl.opacity})`;
    ctx.beginPath();
    ctx.ellipse(cl.x, cl.y, cl.w / 2, cl.w / 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cl.x - cl.w * 0.2, cl.y - cl.w * 0.06, cl.w / 3, cl.w / 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cl.x + cl.w * 0.2, cl.y - cl.w * 0.04, cl.w / 3.5, cl.w / 7, 0, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawBirds() {
  state.birds.forEach(b => {
    b.x += b.speed;
    if (b.x > W() + 20) b.x = -20;

    const wing = Math.sin(state.time * 4 + b.wingPhase) * b.size;
    ctx.strokeStyle = 'rgba(60, 60, 50, 0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(b.x - b.size, b.y + wing);
    ctx.quadraticCurveTo(b.x, b.y - Math.abs(wing) * 0.3, b.x + b.size, b.y + wing);
    ctx.stroke();
  });
}

function drawPaths() {
  state.paths.forEach(p => {
    ctx.fillStyle = 'rgba(170, 160, 140, 0.3)';
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, p.w / 2, p.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(140, 130, 110, 0.12)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  });
}

function drawGrass() {
  state.grassPatches.forEach(g => {
    const sway = Math.sin(state.time * 1.2 + g.phase) * 3;
    ctx.strokeStyle = g.color;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(g.x, g.y);
    ctx.quadraticCurveTo(g.x + sway, g.y - g.h * 0.6, g.x + sway * 1.5, g.y - g.h);
    ctx.stroke();
  });
}

function drawFlowers() {
  state.flowers.forEach(f => {
    ctx.fillStyle = f.color;
    for (let p = 0; p < f.petals; p++) {
      const angle = (p / f.petals) * Math.PI * 2 + state.time * 0.15;
      ctx.beginPath();
      ctx.arc(f.x + Math.cos(angle) * f.size, f.y + Math.sin(angle) * f.size, f.size * 0.55, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = '#f5e04a';
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size * 0.35, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawFences() {
  state.fences.forEach(f => {
    ctx.fillStyle = f.color;
    if (f.isPost) {
      ctx.fillRect(f.x - f.w / 2, f.y, f.w, f.h);
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(f.x - f.w / 2, f.y, f.w, 2);
    } else {
      ctx.fillRect(f.x, f.y, f.w, f.h);
      ctx.strokeStyle = 'rgba(0,0,0,0.06)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(f.x + 2, f.y + f.h * 0.3);
      ctx.lineTo(f.x + f.w - 2, f.y + f.h * 0.3);
      ctx.moveTo(f.x + 3, f.y + f.h * 0.7);
      ctx.lineTo(f.x + f.w - 3, f.y + f.h * 0.7);
      ctx.stroke();
    }
  });
}

function drawBushes() {
  state.bushes.forEach(b => {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.beginPath();
    ctx.ellipse(b.x + 3, b.y + 4, b.r * 0.9, b.r * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.2, b.y - b.r * 0.3, b.r * 0.5, Math.PI, 0);
    ctx.fill();
  });
}

function drawMushrooms() {
  state.mushrooms.forEach(m => {
    ctx.fillStyle = '#e8dcc8';
    ctx.fillRect(m.x - m.size * 0.25, m.y, m.size * 0.5, m.size * 0.8);
    ctx.fillStyle = m.capColor;
    ctx.beginPath();
    ctx.arc(m.x, m.y, m.size, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(m.x - m.size * 0.3, m.y - m.size * 0.3, m.size * 0.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(m.x + m.size * 0.25, m.y - m.size * 0.5, m.size * 0.12, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawRocks() {
  state.rocks.forEach(r => {
    ctx.save();
    ctx.translate(r.x, r.y);
    ctx.rotate(r.angle);
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.beginPath();
    ctx.ellipse(3, 3, r.w / 2, r.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = r.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, r.w / 2, r.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath();
    ctx.ellipse(-r.w * 0.15, -r.h * 0.15, r.w * 0.25, r.h * 0.2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function drawButterflies() {
  state.butterflies.forEach(b => {
    const wingFlap = Math.sin(state.time * 8 + b.wingPhase);
    const wingW = b.size * Math.abs(wingFlap);

    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.fillStyle = b.color;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.ellipse(-wingW * 0.5, 0, wingW, b.size * 0.7, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(wingW * 0.5, 0, wingW, b.size * 0.7, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.ellipse(0, 0, 1, b.size * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  });
}

function drawCleanTrails() {
  state.cleanTrails.forEach(t => {
    ctx.globalAlpha = t.life * 0.12;
    ctx.fillStyle = 'rgba(200, 220, 170, 1)';
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.radius, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawFlyingLeaves() {
  state.flyingLeaves.forEach(fl => {
    ctx.save();
    ctx.globalAlpha = fl.opacity;
    ctx.translate(fl.x, fl.y);
    ctx.rotate(fl.rotation);
    ctx.scale(fl.size, fl.size);
    // Outline for flying leaves too
    ctx.strokeStyle = 'rgba(40, 30, 20, 0.12)';
    ctx.lineWidth = 1 / fl.size;
    ctx.fillStyle = fl.color;
    ctx.beginPath();
    if (fl.type === 0) {
      ctx.moveTo(0, -12);
      ctx.bezierCurveTo(-4, -10, -10, -8, -14, -4);
      ctx.bezierCurveTo(-10, -2, -8, 2, -6, 4);
      ctx.bezierCurveTo(-8, 6, -12, 8, -10, 12);
      ctx.bezierCurveTo(-6, 10, -2, 8, 0, 6);
      ctx.bezierCurveTo(2, 8, 6, 10, 10, 12);
      ctx.bezierCurveTo(12, 8, 8, 6, 6, 4);
      ctx.bezierCurveTo(8, 2, 10, -2, 14, -4);
      ctx.bezierCurveTo(10, -8, 4, -10, 0, -12);
    } else if (fl.type === 1) {
      ctx.ellipse(0, 0, 6, 11, 0, 0, Math.PI * 2);
    } else if (fl.type === 2) {
      ctx.moveTo(0, -13);
      ctx.bezierCurveTo(-8, -6, -7, 4, 0, 13);
      ctx.bezierCurveTo(7, 4, 8, -6, 0, -13);
    } else {
      ctx.ellipse(0, 0, 8, 8, 0, 0, Math.PI * 2);
    }
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  });
  ctx.globalAlpha = 1;
}

function drawTrees() {
  const sorted = [...state.trees].sort((a, b) => a.trunkH - b.trunkH);

  sorted.forEach(t => {
    const sway = Math.sin(state.time * 0.6 + t.swayPhase) * 3;

    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.beginPath();
    ctx.ellipse(t.x + 10, t.y + 5, t.canopyR * 0.8, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#7a6a52';
    ctx.beginPath();
    ctx.moveTo(t.x - 7, t.y);
    ctx.lineTo(t.x - 4 + sway * 0.3, t.y - t.trunkH);
    ctx.lineTo(t.x + 4 + sway * 0.3, t.y - t.trunkH);
    ctx.lineTo(t.x + 7, t.y);
    ctx.fill();

    ctx.strokeStyle = 'rgba(0,0,0,0.06)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(t.x - 2, t.y);
    ctx.lineTo(t.x - 1 + sway * 0.2, t.y - t.trunkH * 0.7);
    ctx.stroke();

    const cx = t.x + sway;
    const cy = t.y - t.trunkH;
    ctx.fillStyle = t.color;
    ctx.beginPath();
    ctx.arc(cx, cy, t.canopyR, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(0,0,0,0.04)';
    ctx.beginPath();
    ctx.arc(cx + t.canopyR * 0.15, cy + t.canopyR * 0.1, t.canopyR * 0.85, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.beginPath();
    ctx.arc(cx - t.canopyR * 0.25, cy - t.canopyR * 0.25, t.canopyR * 0.5, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawLeaves() {
  const groundedLeaves = state.leaves.filter(l => l.grounded && !l.collected);
  groundedLeaves.forEach(leaf => {
    let stackCount = 0;
    for (let other of groundedLeaves) {
      if (other === leaf) continue;
      const dx = other.x - leaf.x;
      const dy = other.y - leaf.y;
      if (dx * dx + dy * dy < 400) stackCount++;
    }
    leaf.stackOffset = Math.min(stackCount * 1.5, 6);
  });

  const sorted = [...state.leaves].sort((a, b) => a.y - b.y);

  sorted.forEach(leaf => {
    if (leaf.collected) return;

    const drawY = leaf.y - (leaf.stackOffset || 0);

    if (leaf.grounded) {
      // Stronger shadow for visibility on rich backgrounds
      ctx.fillStyle = `rgba(30, 20, 10, ${leaf.shadow * 0.2})`;
      ctx.beginPath();
      ctx.ellipse(leaf.x + 3, drawY + 4, leaf.size * 9, leaf.size * 3.5, leaf.rotation * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.globalAlpha = leaf.opacity;

    if (leaf.gold) {
      const theme = leafThemes[state.level - 1];
      // Stronger gold glow
      const glow = 0.35 + Math.sin(state.time * 3 + leaf.goldPhase) * 0.2;
      ctx.fillStyle = `${theme.goldGlow} ${glow})`;
      ctx.beginPath();
      ctx.arc(leaf.x, drawY, leaf.size * 20, 0, Math.PI * 2);
      ctx.fill();
      // Inner bright glow
      ctx.fillStyle = `${theme.goldGlow} ${glow * 0.5})`;
      ctx.beginPath();
      ctx.arc(leaf.x, drawY, leaf.size * 10, 0, Math.PI * 2);
      ctx.fill();
    }

    // Draw leaf with subtle dark outline for contrast
    ctx.save();
    ctx.translate(leaf.x, drawY);
    ctx.rotate(leaf.rotation);
    ctx.scale(leaf.size, leaf.size);
    // Outline
    ctx.strokeStyle = 'rgba(40, 30, 20, 0.15)';
    ctx.lineWidth = 1.2 / leaf.size;
    ctx.fillStyle = leaf.color;
    ctx.beginPath();
    if (leaf.type === 0) {
      ctx.moveTo(0, -12);
      ctx.bezierCurveTo(-4, -10, -10, -8, -14, -4);
      ctx.bezierCurveTo(-10, -2, -8, 2, -6, 4);
      ctx.bezierCurveTo(-8, 6, -12, 8, -10, 12);
      ctx.bezierCurveTo(-6, 10, -2, 8, 0, 6);
      ctx.bezierCurveTo(2, 8, 6, 10, 10, 12);
      ctx.bezierCurveTo(12, 8, 8, 6, 6, 4);
      ctx.bezierCurveTo(8, 2, 10, -2, 14, -4);
      ctx.bezierCurveTo(10, -8, 4, -10, 0, -12);
    } else if (leaf.type === 1) {
      ctx.ellipse(0, 0, 6, 11, 0, 0, Math.PI * 2);
    } else if (leaf.type === 2) {
      ctx.moveTo(0, -13);
      ctx.bezierCurveTo(-8, -6, -7, 4, 0, 13);
      ctx.bezierCurveTo(7, 4, 8, -6, 0, -13);
    } else if (leaf.type === 4) {
      // Cherry blossom petal
      ctx.moveTo(0, -10);
      ctx.bezierCurveTo(-6, -10, -12, -4, -10, 2);
      ctx.bezierCurveTo(-8, 6, -3, 10, 0, 8);
      ctx.bezierCurveTo(3, 10, 8, 6, 10, 2);
      ctx.bezierCurveTo(12, -4, 6, -10, 0, -10);
    } else if (leaf.type === 5) {
      // Bamboo leaf - long narrow
      ctx.moveTo(0, -16);
      ctx.bezierCurveTo(-3, -12, -5, -4, -4, 0);
      ctx.bezierCurveTo(-5, 4, -3, 10, 0, 16);
      ctx.bezierCurveTo(3, 10, 5, 4, 4, 0);
      ctx.bezierCurveTo(5, -4, 3, -12, 0, -16);
    } else {
      ctx.ellipse(0, 0, 8, 8, 0, 0, Math.PI * 2);
    }
    ctx.fill();
    ctx.stroke();
    // Vein
    ctx.strokeStyle = 'rgba(40, 30, 20, 0.1)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, -9);
    ctx.lineTo(0, 9);
    ctx.stroke();
    ctx.restore();
    ctx.globalAlpha = 1;
  });
}

function drawSweepTrail() {
  if (state.sweepTrail.length < 2) return;

  ctx.strokeStyle = 'rgba(180, 170, 150, 0.06)';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(state.sweepTrail[0].x, state.sweepTrail[0].y);

  for (let i = 1; i < state.sweepTrail.length; i++) {
    ctx.lineTo(state.sweepTrail[i].x, state.sweepTrail[i].y);
  }
  ctx.stroke();
}

function drawParticles() {
  state.particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });

  state.dustParticles.forEach(p => {
    ctx.globalAlpha = p.life * 0.3;
    ctx.fillStyle = '#c4b890';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });

  state.windParticles.forEach(p => {
    ctx.globalAlpha = p.life * 0.35;
    ctx.fillStyle = 'rgba(180, 210, 230, 0.5)';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.globalAlpha = 1;
}

function drawToolEffect() {
  if (!state.mouseDown || !state.running || state.paused) return;

  const mx = state.mouseX, my = state.mouseY;
  const radius = state.toolRadius[state.tool];

  if (state.tool === 'rake') {
    ctx.strokeStyle = 'rgba(212, 118, 58, 0.2)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(mx, my, radius, -0.4, 0.4);
    ctx.stroke();
    for (let i = -3; i <= 3; i++) {
      const a = i * 0.1;
      ctx.beginPath();
      ctx.moveTo(mx + Math.cos(a) * (radius - 8), my + Math.sin(a) * (radius - 8));
      ctx.lineTo(mx + Math.cos(a) * (radius + 4), my + Math.sin(a) * (radius + 4));
      ctx.stroke();
    }
  } else if (state.tool === 'blower') {
    const blowGrad = ctx.createRadialGradient(mx, my, 0, mx, my, radius);
    blowGrad.addColorStop(0, 'rgba(126, 184, 212, 0.05)');
    blowGrad.addColorStop(1, 'rgba(126, 184, 212, 0)');
    ctx.fillStyle = blowGrad;
    ctx.beginPath();
    ctx.arc(mx, my, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(126, 184, 212, 0.12)';
    ctx.lineWidth = 1;
    ctx.setLineDash([5, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
  } else if (state.tool === 'vacuum') {
    const vacGrad = ctx.createRadialGradient(mx, my, 0, mx, my, radius);
    vacGrad.addColorStop(0, 'rgba(212, 160, 58, 0.1)');
    vacGrad.addColorStop(0.6, 'rgba(212, 118, 58, 0.04)');
    vacGrad.addColorStop(1, 'rgba(212, 118, 58, 0)');
    ctx.fillStyle = vacGrad;
    ctx.beginPath();
    ctx.arc(mx, my, radius, 0, Math.PI * 2);
    ctx.fill();
  } else if (state.tool === 'broom') {
    ctx.strokeStyle = 'rgba(196, 168, 200, 0.25)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(mx, my, radius, -0.6, 0.6);
    ctx.stroke();
    // Magic sparkles
    for (let i = 0; i < 3; i++) {
      const angle = (state.time * 3 + i * 2.1) % (Math.PI * 2);
      const dist = radius * 0.7;
      ctx.fillStyle = 'rgba(196, 168, 200, 0.4)';
      ctx.beginPath();
      ctx.arc(mx + Math.cos(angle) * dist, my + Math.sin(angle) * dist, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (state.tool === 'flame') {
    const flameGrad = ctx.createRadialGradient(mx, my, 0, mx, my, radius);
    flameGrad.addColorStop(0, 'rgba(232, 90, 58, 0.1)');
    flameGrad.addColorStop(0.5, 'rgba(232, 160, 58, 0.05)');
    flameGrad.addColorStop(1, 'rgba(232, 160, 58, 0)');
    ctx.fillStyle = flameGrad;
    ctx.beginPath();
    ctx.arc(mx, my, radius, 0, Math.PI * 2);
    ctx.fill();
  } else if (state.tool === 'freeze') {
    ctx.strokeStyle = 'rgba(126, 200, 227, 0.15)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(mx, my, radius, 0, Math.PI * 2);
    ctx.stroke();
  } else if (state.tool === 'magnet') {
    const magGrad = ctx.createRadialGradient(mx, my, 0, mx, my, radius);
    magGrad.addColorStop(0, 'rgba(196, 168, 200, 0.06)');
    magGrad.addColorStop(1, 'rgba(196, 168, 200, 0)');
    ctx.fillStyle = magGrad;
    ctx.beginPath();
    ctx.arc(mx, my, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(196, 168, 200, 0.12)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 6]);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ==================== UPDATE ====================

function updateLeaves(dt) {
  // If freeze is active, don't update falling leaves
  if (state.freezeActive) return;

  state.leaves.forEach(leaf => {
    if (leaf.collected) return;

    if (!leaf.grounded) {
      leaf.vy += 0.12;
      const windForce = state.windEventActive ? state.windStrength * 0.03 : state.windStrength * 0.008;
      leaf.vx += Math.sin(state.time + leaf.swayPhase) * 0.015 + windForce;
      leaf.x += leaf.vx * dt;
      leaf.y += leaf.vy * dt;
      leaf.rotation += leaf.rotSpeed * dt;

      if (leaf.x < -20) leaf.x = W() + 20;
      if (leaf.x > W() + 20) leaf.x = -20;

      if (leaf.y >= leaf.targetY) {
        leaf.y = leaf.targetY;
        leaf.grounded = true;
        leaf.vy = 0;
        leaf.vx = 0;
        AudioEngine.play('land');
      }
    } else {
      if (state.windEventActive && Math.random() < 0.003) {
        leaf.grounded = false;
        leaf.vy = -2 - Math.random() * 2;
        leaf.vx = state.windStrength * 2 + (Math.random() - 0.5);
        leaf.targetY = leaf.y + 20 + Math.random() * 30;
      }
      leaf.x += Math.sin(state.time * 0.6 + leaf.swayPhase) * leaf.swayAmp * 0.08;
      leaf.rotation += Math.sin(state.time * 0.8 + leaf.swayPhase) * 0.002;
    }
  });
}

function updateParticles(dt) {
  state.particles = state.particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= p.decay;
    return p.life > 0;
  });
  state.dustParticles = state.dustParticles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    return p.life > 0;
  });
  state.windParticles = state.windParticles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    return p.life > 0;
  });

  if (state.sweepTrail.length > 30) state.sweepTrail.shift();
}

function updateFlyingLeaves() {
  state.flyingLeaves = state.flyingLeaves.filter(fl => {
    fl.progress += fl.speed;
    if (fl.progress >= 1) return false;

    const t = 1 - Math.pow(1 - fl.progress, 3);
    fl.x = fl.startX + (fl.targetX - fl.startX) * t;
    fl.y = fl.startY + (fl.targetY - fl.startY) * t;
    fl.y -= Math.sin(fl.progress * Math.PI) * 40;
    fl.size = fl.size * (1 - fl.speed * 0.5);
    fl.rotation += 0.15;
    fl.opacity = 1 - fl.progress;

    return true;
  });
}

function updateCleanTrails() {
  state.cleanTrails = state.cleanTrails.filter(t => {
    t.life -= t.decay;
    return t.life > 0;
  });
}

function updateButterflies() {
  state.butterflies.forEach(b => {
    b.changeTimer++;
    if (b.changeTimer > 60 + Math.random() * 120) {
      b.vx = (Math.random() - 0.5) * 0.8;
      b.vy = (Math.random() - 0.5) * 0.4;
      b.changeTimer = 0;
    }
    b.x += b.vx;
    b.y += b.vy + Math.sin(state.time * 2 + b.wingPhase) * 0.2;

    if (b.x < -20) b.x = W() + 20;
    if (b.x > W() + 20) b.x = -20;
    if (b.y < H() * 0.3) b.vy = Math.abs(b.vy);
    if (b.y > H() * 0.85) b.vy = -Math.abs(b.vy);
  });
}

function updateWindDrop() {
  if (state.freezeActive) return;
  state.windDropTimer++;
  if (state.windDropTimer >= 240) {
    state.windDropTimer = 0;
    const dropCount = 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < dropCount; i++) {
      if (state.trees.length > 0) {
        const tree = state.trees[Math.floor(Math.random() * state.trees.length)];
        const leaf = createLeaf(tree.x + (Math.random() - 0.5) * 30, tree.y - tree.trunkH - tree.canopyR * 0.5);
        state.leaves.push(leaf);
      }
    }
  }
}

function updateWindEvent() {
  if (!state.running || state.paused) return;

  state.windEventTimer++;

  if (!state.windEventActive && state.windEventTimer > 1200 + Math.random() * 1200) {
    state.windEventActive = true;
    state.windEventDuration = 180 + Math.floor(Math.random() * 180);
    state.windEventTimer = 0;
    AudioEngine.play('wind');
    showNotification('🌬️ 一阵风吹过，落叶纷飞!');
    for (let i = 0; i < 5 + state.level * 2; i++) {
      if (state.trees.length > 0) {
        const tree = state.trees[Math.floor(Math.random() * state.trees.length)];
        setTimeout(() => {
          if (state.running && !state.paused && !state.freezeActive) {
            const leaf = createLeaf(tree.x + (Math.random() - 0.5) * 50, tree.y - tree.trunkH - tree.canopyR * 0.5);
            leaf.vx = (Math.random() - 0.3) * 3;
            state.leaves.push(leaf);
          }
        }, i * 100);
      }
    }
  }

  if (state.windEventActive) {
    state.windEventDuration--;
    if (state.windEventDuration <= 0) {
      state.windEventActive = false;
      state.windEventTimer = 0;
    }
  }
}

function updateFreeze() {
  if (state.freezeActive) {
    state.freezeTimer--;
    if (state.freezeTimer <= 0) {
      state.freezeActive = false;
      document.getElementById('freezeOverlay').classList.remove('active');
    }
  }
}

function updateMagnet() {
  if (!state.magnetActive || !state.running || state.paused) return;

  state.magnetTimer--;
  if (state.magnetTimer <= 0) {
    state.magnetActive = false;
    return;
  }

  // Auto-collect leaves near cursor
  const mx = state.mouseX;
  const my = state.mouseY;
  const radius = state.toolRadius.magnet;

  state.leaves.forEach(leaf => {
    if (leaf.collected || !leaf.grounded) return;
    const dx = leaf.x - mx;
    const dy = leaf.y - my;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < radius) {
      // Pull toward cursor
      leaf.x -= dx * 0.06;
      leaf.y -= dy * 0.06;
      if (dist < 20) {
        leaf.collected = true;
        state.leavesCollected++;
        if (leaf.gold) state.goldLeavesCollected++;
        addFlyingLeaf(leaf);
        addCleanTrail(leaf.x, leaf.y);
        spawnCollectParticles(leaf.x, leaf.y, leaf.color, 2);
      }
    }
  });

  if (state.leavesCollected > 0) {
    const coinGain = Math.ceil(1 * state.combo * 0.5);
    state.coins += coinGain;
    state.totalCoins += coinGain;
    state.comboTimer = 80;
    updateHUD();
    checkAchievements();
    checkLevelComplete();
  }
}

function triggerScreenShake(intensity) {
  state.screenShake = intensity;
  state.screenShakeDecay = intensity * 0.15;
}

function applyScreenShake() {
  if (state.screenShake > 0.1) {
    const dx = (Math.random() - 0.5) * state.screenShake * 2;
    const dy = (Math.random() - 0.5) * state.screenShake * 2;
    ctx.save();
    ctx.translate(dx, dy);
    state.screenShake -= state.screenShakeDecay;
    if (state.screenShake < 0) state.screenShake = 0;
    return true;
  }
  return false;
}

// --- Flying Leaf & Clean Trail Helpers ---

function getCoinHUDPos() {
  const coinEl = document.getElementById('coinValue');
  if (!coinEl) return { x: W() - 60, y: 40 };
  const rect = coinEl.getBoundingClientRect();
  return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
}

function addFlyingLeaf(leaf) {
  const target = getCoinHUDPos();
  state.flyingLeaves.push({
    x: leaf.x,
    y: leaf.y,
    startX: leaf.x,
    startY: leaf.y,
    targetX: target.x,
    targetY: target.y,
    size: leaf.size,
    rotation: leaf.rotation,
    color: leaf.color,
    type: leaf.type,
    opacity: 1,
    progress: 0,
    speed: 0.025 + Math.random() * 0.015,
  });
}

function addCleanTrail(x, y) {
  state.cleanTrails.push({
    x: x + (Math.random() - 0.5) * 10,
    y: y + (Math.random() - 0.5) * 10,
    radius: 15 + Math.random() * 15,
    life: 1,
    decay: 0.003 + Math.random() * 0.002,
  });
}

let blowSoundCooldown = 0;
let vacuumSoundCooldown = 0;

function handleToolInteraction() {
  if (!state.mouseDown || !state.running || state.paused) return;

  const mx = state.mouseX, my = state.mouseY;
  const radius = state.toolRadius[state.tool];
  const speed = state.toolSpeed[state.tool];

  state.sweepTrail.push({ x: mx, y: my });

  let collected = 0;
  let goldCollected = 0;

  // Special tools: freeze and magnet are toggles, not hold-to-use
  if (state.tool === 'freeze') {
    if (!state.freezeActive) {
      state.freezeActive = true;
      state.freezeTimer = 300; // 5 seconds at 60fps
      document.getElementById('freezeOverlay').classList.add('active');
      AudioEngine.play('freeze');
      showNotification('❄️ 时间冻结! 落叶暂停飘落');
      spawnFreezeParticle(mx, my);
    }
    return;
  }

  if (state.tool === 'magnet') {
    if (!state.magnetActive) {
      state.magnetActive = true;
      state.magnetTimer = 360; // 6 seconds
      AudioEngine.play('magnet');
      showNotification('🧲 磁铁激活! 自动吸引周围落叶');
    }
    return;
  }

  state.leaves.forEach(leaf => {
    if (leaf.collected || !leaf.grounded) return;

    const dx = leaf.x - mx;
    const dy = leaf.y - my;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < radius) {
      if (state.tool === 'blower') {
        const angle = Math.atan2(dy, dx);
        const pushX = Math.cos(angle) * speed * 2.5;
        const pushY = Math.sin(angle) * speed * 1.2;
        leaf.x += pushX;
        leaf.y += pushY;
        leaf.x = Math.max(20, Math.min(W() - 20, leaf.x));
        leaf.y = Math.max(H() * 0.52, Math.min(H() - 80, leaf.y));
        leaf.grounded = false;
        leaf.vy = -1;
        leaf.vx = Math.cos(angle) * speed * 1.5;
        leaf.targetY = Math.min(leaf.y + 30, H() - 100);
        if (Math.random() < 0.2) spawnWindParticle(mx, my, angle);
        blowSoundCooldown--;
        if (blowSoundCooldown <= 0) {
          AudioEngine.play('blow');
          blowSoundCooldown = 4;
        }
      } else if (state.tool === 'vacuum') {
        const suctionStrength = 0.18;
        leaf.x -= dx * suctionStrength;
        leaf.y -= dy * suctionStrength;
        leaf.rotation += 0.08;
        if (dist < 18) {
          leaf.collected = true;
          collected++;
          if (leaf.gold) goldCollected++;
          addFlyingLeaf(leaf);
          addCleanTrail(leaf.x, leaf.y);
        }
        vacuumSoundCooldown--;
        if (vacuumSoundCooldown <= 0) {
          AudioEngine.play('vacuum');
          vacuumSoundCooldown = 6;
        }
      } else if (state.tool === 'broom') {
        // Magic broom: wide arc sweep, collects multiple leaves at once
        leaf.collected = true;
        collected++;
        if (leaf.gold) goldCollected++;
        addFlyingLeaf(leaf);
        addCleanTrail(leaf.x, leaf.y);
        AudioEngine.play('magic');
      } else if (state.tool === 'flame') {
        // Flame: instant clear in area
        leaf.collected = true;
        collected++;
        if (leaf.gold) goldCollected++;
        spawnFlameParticle(leaf.x, leaf.y);
      } else {
        leaf.collected = true;
        collected++;
        if (leaf.gold) goldCollected++;
        addFlyingLeaf(leaf);
        addCleanTrail(leaf.x, leaf.y);
      }
    }
  });

  if (collected > 0) {
    state.leavesCollected += collected;
    state.goldLeavesCollected += goldCollected;
    state.comboTimer = 80;

    const now = performance.now();
    if (now - state.lastCollectTime < 600) {
      state.combo = Math.min(state.combo + Math.ceil(collected * 0.5), 20);
    } else {
      state.combo = Math.max(1, state.combo);
    }
    state.lastCollectTime = now;

    const multiplier = goldCollected > 0 ? 2 : 1;
    const points = collected * 10 * state.combo * multiplier;
    state.score += points;
    const coinGain = Math.ceil(collected * state.combo * multiplier * 0.5);
    state.coins += coinGain;
    state.totalCoins += coinGain;

    if (state.combo > state.maxCombo) state.maxCombo = state.combo;

    if (collected >= 3) {
      triggerScreenShake(Math.min(collected * 0.8, 4));
      AudioEngine.play('shake');
    }

    const particleCount = Math.min(collected * 2, 10);
    for (let i = 0; i < particleCount; i++) {
      spawnCollectParticles(
        mx + (Math.random() - 0.5) * 30,
        my + (Math.random() - 0.5) * 30,
        goldCollected > 0 ? leafThemes[state.level - 1].goldColor : leafThemes[state.level - 1].particleColors[Math.floor(Math.random() * leafThemes[state.level - 1].particleColors.length)],
        3
      );
    }
    spawnDustParticle(mx, my);

    if (goldCollected > 0) {
      AudioEngine.play('gold');
    } else {
      AudioEngine.play('collect');
    }

    if (coinGain > 2) {
      spawnCoinFly(mx + (Math.random() - 0.5) * 20, my - 10);
    }

    if (state.combo >= 3) {
      AudioEngine.play('combo');
      showComboPopup(mx, my - 40, `x${state.combo} 连击!`);
    }

    if (goldCollected > 0) {
      showComboPopup(mx + 30, my - 20, '双倍!', true);
    }

    updateHUD();
    checkAchievements();
    checkLevelComplete();
  }
}

function updateCombo() {
  if (state.comboTimer > 0) {
    state.comboTimer--;
  } else if (state.combo > 1) {
    state.combo = Math.max(1, state.combo - 1);
  }
}

function updateWind() {
  state.windAngle = Math.sin(state.time * 0.15) * 0.5;
  state.windStrength = Math.sin(state.time * 0.1) * 1.5;
}

// ==================== HUD ====================

function updateHUD() {
  const scoreEl = document.getElementById('scoreValue');
  const remainingEl = document.getElementById('remainingValue');
  const totalEl = document.getElementById('totalLeavesValue');
  const comboEl = document.getElementById('comboValue');
  const coinEl = document.getElementById('coinValue');

  const prevScore = scoreEl.textContent;
  const prevRemaining = remainingEl.textContent;
  const prevCombo = comboEl.textContent;
  const prevCoins = coinEl.textContent;

  const remaining = Math.max(0, state.leavesRequired - state.leavesCollected);

  scoreEl.textContent = state.leavesCollected;
  totalEl.textContent = state.leavesRequired;
  remainingEl.textContent = remaining;
  comboEl.textContent = `x${state.combo}`;
  coinEl.textContent = state.totalCoins;

  if (prevScore !== String(state.leavesCollected)) {
    scoreEl.classList.remove('bump');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('bump');
    setTimeout(() => scoreEl.classList.remove('bump'), 300);
  }
  if (prevRemaining !== String(remaining)) {
    remainingEl.classList.remove('bump');
    void remainingEl.offsetWidth;
    remainingEl.classList.add('bump');
    setTimeout(() => remainingEl.classList.remove('bump'), 300);
  }
  if (prevCombo !== `x${state.combo}`) {
    comboEl.classList.remove('bump');
    void comboEl.offsetWidth;
    comboEl.classList.add('bump');
    setTimeout(() => comboEl.classList.remove('bump'), 300);
  }
  if (prevCoins !== String(state.totalCoins)) {
    coinEl.classList.remove('bump');
    void coinEl.offsetWidth;
    coinEl.classList.add('bump');
    setTimeout(() => coinEl.classList.remove('bump'), 300);
  }

  const progress = Math.min((state.leavesCollected / state.leavesRequired) * 100, 100);
  document.getElementById('progressFill').style.width = progress + '%';

  const comboBarFill = document.getElementById('comboBarFill');
  const comboRatio = state.comboTimer / 80;
  comboBarFill.style.width = (comboRatio * 100) + '%';
  if (comboRatio < 0.25 && state.combo > 1) {
    comboBarFill.classList.add('urgent');
  } else {
    comboBarFill.classList.remove('urgent');
  }
}

function showComboPopup(x, y, text, isGold) {
  const popup = document.createElement('div');
  popup.className = 'combo-popup' + (isGold ? ' gold' : '');
  popup.textContent = text;
  popup.style.left = x + 'px';
  popup.style.top = y + 'px';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 1200);
}

function showNotification(text) {
  const el = document.getElementById('notification');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function showAchievement(title, text) {
  state.achievementQueue.push({ title, text });
  processAchievementQueue();
}

function processAchievementQueue() {
  if (state.achievementShowing || state.achievementQueue.length === 0) return;

  const next = state.achievementQueue.shift();
  state.achievementShowing = true;

  const topPos = 70;

  const toast = document.createElement('div');
  toast.className = 'achievement-toast';
  toast.style.top = topPos + 'px';
  toast.innerHTML = `<div class="achieve-title">${next.title}</div><div class="achieve-text">${next.text}</div>`;
  document.body.appendChild(toast);

  requestAnimationFrame(() => {
    toast.classList.add('visible');
  });

  setTimeout(() => {
    toast.classList.remove('visible');
    setTimeout(() => {
      toast.remove();
      state.achievementShowing = false;
      processAchievementQueue();
    }, 500);
  }, 2800);
}

// ==================== ACHIEVEMENTS ====================

function checkAchievements() {
  if (!state.achievements.first10 && state.leavesCollected >= 10) {
    state.achievements.first10 = true;
    showAchievement('成就解锁', '初出茅庐 — 清理10片落叶');
  }
  if (!state.achievements.combo5 && state.combo >= 5) {
    state.achievements.combo5 = true;
    showAchievement('成就解锁', '连击达人 — 达成5连击');
  }
  if (!state.achievements.combo10 && state.combo >= 10) {
    state.achievements.combo10 = true;
    showAchievement('成就解锁', '连击大师 — 达成10连击');
  }
  if (!state.achievements.gold5 && state.goldLeavesCollected >= 5) {
    state.achievements.gold5 = true;
    showAchievement('成就解锁', '黄金猎人 — 收集5片金色落叶');
  }
  if (!state.achievements.firstUnlock && Object.values(state.toolUnlocked).filter(v => v).length >= 2) {
    state.achievements.firstUnlock = true;
    showAchievement('成就解锁', '工具升级 — 解锁第一个新工具');
  }
  if (!state.achievements.allTools && Object.values(state.toolUnlocked).every(v => v)) {
    state.achievements.allTools = true;
    showAchievement('成就解锁', '工具大师 — 解锁所有工具');
  }
  if (!state.achievements.level5 && state.level >= 5) {
    state.achievements.level5 = true;
    showAchievement('成就解锁', '庭院专家 — 通过第5关');
  }
}

// ==================== LEVEL COMPLETE ====================

function checkLevelComplete() {
  if (state.leavesCollected >= state.leavesRequired && state.running) {
    state.running = false;
    setTimeout(() => {
      const isFinal = state.level >= state.maxLevel;
      showLevelComplete(isFinal);
    }, 600);
  }
}

function showLevelComplete(isFinal) {
  AudioEngine.play('levelup');

  const timeStr = Math.floor(state.levelTime) + 's';

  document.getElementById('lcLeaves').textContent = state.leavesCollected;
  document.getElementById('lcCoins').textContent = state.coins;
  document.getElementById('lcCombo').textContent = state.maxCombo;
  document.getElementById('lcTime').textContent = timeStr;

  const stars = 1 + (state.levelTime < 60 ? 1 : 0) + (state.maxCombo >= 5 ? 1 : 0);
  document.getElementById('star1').classList.toggle('earned', stars >= 1);
  document.getElementById('star2').classList.toggle('earned', stars >= 2);
  document.getElementById('star3').classList.toggle('earned', stars >= 3);

  const completeEl = document.getElementById('levelComplete');
  document.getElementById('lcTitle').textContent = isFinal ? '全部通关!' : '庭院整洁如新!';
  document.getElementById('lcSubtitle').textContent = isFinal ? '你是落叶清理大师!' : '出色的清扫工作';
  document.getElementById('nextBtn').textContent = isFinal ? '重新开始' : '下一关';

  setTimeout(() => completeEl.classList.add('show'), 100);
}

// ==================== MAIN LOOP ====================

let lastTime = 0;
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 16.67, 3);
  lastTime = timestamp;

  if (!state.paused) {
    state.time += 0.016;
    if (state.running) state.levelTime += 0.016;
  }

  const shaking = applyScreenShake();

  ctx.clearRect(0, 0, W(), H());

  // Draw scene layers
  drawBackground();
  // Subtle ground overlay to help leaves stand out against background
  drawGroundOverlay();
  drawCleanTrails();
  drawSweepTrail();
  drawLeaves();
  drawFlyingLeaves();
  drawButterflies();
  drawParticles();
  drawToolEffect();

  if (shaking) ctx.restore();

  if (state.running && !state.paused) {
    updateWind();
    updateLeaves(dt);
    updateParticles(dt);
    updateFlyingLeaves();
    updateCleanTrails();
    updateButterflies();
    updateWindDrop();
    updateWindEvent();
    updateFreeze();
    updateMagnet();
    updateCombo();
    handleToolInteraction();
  }

  requestAnimationFrame(gameLoop);
}

// ==================== INPUT ====================

// Tool icon mapping
const toolIcons = { hand: '✋', rake: '🧹', blower: '💨', vacuum: '🔌', broom: '🧙', flame: '🔥', freeze: '❄️', magnet: '🧲' };

function updateToolCursor() {
  const tc = document.getElementById('toolCursor');
  tc.textContent = toolIcons[state.tool] || '✋';
}

canvas.addEventListener('mousemove', e => {
  state.prevMouseX = state.mouseX;
  state.prevMouseY = state.mouseY;
  state.mouseX = e.clientX;
  state.mouseY = e.clientY;

  const tc = document.getElementById('toolCursor');
  tc.style.left = e.clientX + 'px';
  tc.style.top = e.clientY + 'px';

  const ring = document.getElementById('actionRing');
  if (state.mouseDown) {
    const r = state.toolRadius[state.tool];
    ring.style.left = e.clientX + 'px';
    ring.style.top = e.clientY + 'px';
    ring.style.width = r * 2 + 'px';
    ring.style.height = r * 2 + 'px';
  }
});

canvas.addEventListener('mouseenter', () => {
  document.getElementById('toolCursor').classList.add('active');
});

canvas.addEventListener('mouseleave', () => {
  state.mouseDown = false;
  state.sweepTrail = [];
  document.getElementById('toolCursor').classList.remove('active', 'pressing');
  document.getElementById('actionRing').classList.remove('visible');
});

canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  state.mouseDown = true;
  document.getElementById('toolCursor').classList.add('pressing');

  const ring = document.getElementById('actionRing');
  const r = state.toolRadius[state.tool];
  ring.style.left = e.clientX + 'px';
  ring.style.top = e.clientY + 'px';
  ring.style.width = r * 2 + 'px';
  ring.style.height = r * 2 + 'px';
  ring.className = 'action-ring visible ' + state.tool;
  AudioEngine.resume();
});

canvas.addEventListener('mouseup', () => {
  state.mouseDown = false;
  state.sweepTrail = [];
  document.getElementById('toolCursor').classList.remove('pressing');
  document.getElementById('actionRing').classList.remove('visible');
});

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  state.mouseX = t.clientX;
  state.mouseY = t.clientY;
  state.mouseDown = true;
  AudioEngine.resume();
  document.getElementById('toolCursor').classList.remove('active');
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  state.mouseX = t.clientX;
  state.mouseY = t.clientY;
}, { passive: false });

canvas.addEventListener('touchend', () => {
  state.mouseDown = false;
  state.sweepTrail = [];
  document.getElementById('actionRing').classList.remove('visible');
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
    if (state.running || state.paused) togglePause();
  }
  if (e.key === 'h' || e.key === 'H') {
    toggleToolbar();
  }
  const toolKeys = { '1': 'hand', '2': 'rake', '3': 'blower', '4': 'vacuum', '5': 'broom', '6': 'flame', '7': 'freeze', '8': 'magnet' };
  if (toolKeys[e.key]) selectTool(toolKeys[e.key]);
});

// Double-click to toggle toolbar
let lastClickTime = 0;
canvas.addEventListener('click', () => {
  const now = Date.now();
  if (now - lastClickTime < 300) toggleToolbar();
  lastClickTime = now;
});

function toggleToolbar() {
  const toolbar = document.getElementById('toolbar');
  toolbar.classList.toggle('hidden-bar');
  const isHidden = toolbar.classList.contains('hidden-bar');
  showNotification(isHidden ? '工具栏已隐藏 (按 H 显示)' : '工具栏已显示');
}

// ==================== TOOL SELECTION ====================

function selectTool(tool) {
  const btn = document.querySelector(`.tool-btn[data-tool="${tool}"]`);
  if (!btn) return;

  if (!state.toolUnlocked[tool]) {
    const cost = state.toolCost[tool];
    if (state.totalCoins >= cost) {
      state.totalCoins -= cost;
      state.toolUnlocked[tool] = true;
      btn.classList.remove('locked');
      const overlay = btn.querySelector('.lock-overlay');
      if (overlay) overlay.remove();
      const costEl = btn.querySelector('.tool-cost');
      if (costEl) costEl.remove();
      showNotification(`已解锁 ${btn.querySelector('.tool-name').textContent}!`);
      AudioEngine.play('unlock');
      updateHUD();
    } else {
      showNotification(`金币不足! 需要 ${cost} 金币 (当前: ${state.totalCoins})`);
      return;
    }
  }

  state.tool = tool;
  updateToolCursor();
  AudioEngine.play('switch');
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => selectTool(btn.dataset.tool));
});

// ==================== PAUSE ====================

function togglePause() {
  if (!state.running && !state.paused) return;

  state.paused = !state.paused;
  state.running = !state.paused;

}

document.getElementById('pauseBtn').addEventListener('click', togglePause);
document.getElementById('resumeBtn').addEventListener('click', togglePause);

document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('pauseMenu').classList.remove('show');
  state.paused = false;
  state.running = true;
  document.getElementById('pauseBtn').textContent = '⏸';
  setupLevel();
});

document.getElementById('quitBtn').addEventListener('click', () => {
  document.getElementById('pauseMenu').classList.remove('show');
  state.paused = false;
  state.running = false;
  state.level = 1;
  state.totalCoins = 0;
  state.toolUnlocked = { hand: true, rake: false, blower: false, vacuum: false, broom: false, flame: false, freeze: false, magnet: false };
  state.toolUpgrades = { hand: 0, rake: 0, blower: 0, vacuum: 0, broom: 0, flame: 0, freeze: 0, magnet: 0 };
  state.achievements = {};
  document.getElementById('hud').style.display = 'none';
  document.getElementById('toolbar').style.display = 'none';
  document.getElementById('pauseBtn').style.display = 'none';
  document.getElementById('startScreen').classList.remove('hidden');
  resetToolButtons();
});

function resetToolButtons() {
  document.querySelectorAll('.tool-btn').forEach(btn => {
    const tool = btn.dataset.tool;
    if (tool !== 'hand') {
      btn.classList.add('locked');
      if (!btn.querySelector('.lock-overlay')) {
        const overlay = document.createElement('div');
        overlay.className = 'lock-overlay';
        overlay.textContent = '🔒';
        btn.appendChild(overlay);
      }
      if (!btn.querySelector('.tool-cost')) {
        const costEl = document.createElement('span');
        costEl.className = 'tool-cost';
        costEl.textContent = state.toolCost[tool] + '🪙';
        btn.appendChild(costEl);
      }
    }
    btn.classList.remove('active');
  });
  document.querySelector('.tool-btn[data-tool="hand"]').classList.add('active');
  state.tool = 'hand';
}

// ==================== START SCREEN ====================

function createStartLeaves() {
  const container = document.getElementById('startLeaves');
  const leafEmojis = ['🍂', '🍁', '🍃', '🍂', '🍁', '🍂'];
  for (let i = 0; i < 25; i++) {
    const leaf = document.createElement('div');
    leaf.className = 'start-leaf';
    leaf.textContent = leafEmojis[Math.floor(Math.random() * leafEmojis.length)];
    leaf.style.left = Math.random() * 100 + '%';
    leaf.style.animationDuration = (6 + Math.random() * 12) + 's';
    leaf.style.animationDelay = Math.random() * 12 + 's';
    leaf.style.fontSize = (14 + Math.random() * 22) + 'px';
    container.appendChild(leaf);
  }
}
createStartLeaves();

document.getElementById('startBtn').addEventListener('click', () => {
  AudioEngine.init();
  AudioEngine.resume();

  document.getElementById('startScreen').classList.add('hidden');

  setTimeout(() => {
    document.getElementById('hud').style.display = '';
    document.getElementById('toolbar').style.display = '';
    document.getElementById('pauseBtn').style.display = '';

    showLevelTransition(() => {
      state.running = true;
      setupLevel();
    });
  }, 500);
});

document.getElementById('nextBtn').addEventListener('click', () => {
  document.getElementById('levelComplete').classList.remove('show');

  setTimeout(() => {
    if (state.level >= state.maxLevel) {
      state.level = 1;
      state.totalCoins = 0;
      state.toolUnlocked = { hand: true, rake: false, blower: false, vacuum: false, broom: false, flame: false, freeze: false, magnet: false };
      state.toolUpgrades = { hand: 0, rake: 0, blower: 0, vacuum: 0, broom: 0, flame: 0, freeze: 0, magnet: 0 };
      state.achievements = {};
      resetToolButtons();
    } else {
      state.level++;
    }

    showLevelTransition(() => {
      state.running = true;
      setupLevel();
    });
  }, 300);
});

// ==================== START ====================
requestAnimationFrame(gameLoop);
</script>
